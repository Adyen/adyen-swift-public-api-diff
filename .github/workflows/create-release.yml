name: 🥘 Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.12.0)'
        required: true
      source_branch:
        description: 'Branch to create the release from'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - name: ✅ Validate version format
      run: |
        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version format: '$VERSION'. Expected X.Y.Z"
          exit 1
        fi
      env:
        VERSION: ${{ inputs.version }}

    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.source_branch }}
        fetch-depth: 0

    - name: 🌿 Create and push release branch
      run: |
        git checkout -b "release/$VERSION"
        git push origin "release/$VERSION"
      env:
        VERSION: ${{ inputs.version }}

    - name: 📝 Update version references
      run: |
        sed -i "s|uses: Adyen/adyen-swift-public-api-diff@[0-9]*\.[0-9]*\.[0-9]*|uses: Adyen/adyen-swift-public-api-diff@${VERSION}|g" Examples/github-workflow.yml README.md
        sed -i "s|adyen-swift-public-api-diff\", from: \"[0-9]*\.[0-9]*\.[0-9]*\"|adyen-swift-public-api-diff\", from: \"${VERSION}\"|g" README.md
      env:
        VERSION: ${{ inputs.version }}

    - name: 💾 Commit version bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Examples/github-workflow.yml README.md
        git diff --cached --quiet || git commit -m "Bump version to $VERSION"
        git push origin "release/$VERSION"
      env:
        VERSION: ${{ inputs.version }}

    - name: 🚀 Create draft release and tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ inputs.version }}
      run: |
        RELEASE_URL=$(gh release create "$VERSION" \
          --draft \
          --generate-notes \
          --target "release/$VERSION" \
          --title "$VERSION")
        echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV

    - name: 📬 Open PR to merge release branch back to main
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ inputs.version }}
        SOURCE_BRANCH: ${{ inputs.source_branch }}
      run: |
        gh pr create \
          --base "$SOURCE_BRANCH" \
          --head "release/$VERSION" \
          --title "Release $VERSION" \
          --body "$(cat <<EOF
        ## Release $VERSION

        Merges the version bump from the \`$VERSION\` release back into \`$SOURCE_BRANCH\`.

        ### Next steps
        1. Review and edit the draft release notes: $RELEASE_URL
        2. Approve and merge this PR
        3. Publish the release
        EOF
        )"
