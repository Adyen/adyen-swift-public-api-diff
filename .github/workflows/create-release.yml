name: 🏷️ Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.12.0)'
        required: true
      source_branch:
        description: 'Branch to create the release from'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - name: ✅ Validate version format
      run: |
        if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version format: '${{ inputs.version }}'. Expected X.Y.Z"
          exit 1
        fi

    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.source_branch }}
        fetch-depth: 0

    - name: 🌿 Create and push release branch
      run: |
        git checkout -b release/${{ inputs.version }}
        git push origin release/${{ inputs.version }}

    - name: 📝 Update version in Examples/github-workflow.yml
      run: |
        sed -i "s|uses: Adyen/adyen-swift-public-api-diff@[0-9]*\.[0-9]*\.[0-9]*|uses: Adyen/adyen-swift-public-api-diff@${{ inputs.version }}|g" Examples/github-workflow.yml

    - name: 💾 Commit version bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Examples/github-workflow.yml
        git commit -m "Bump version to ${{ inputs.version }}"
        git push origin release/${{ inputs.version }}

    - name: 🚀 Create draft release and tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ inputs.version }} \
          --draft \
          --generate-notes \
          --target release/${{ inputs.version }} \
          --title "${{ inputs.version }}"

    - name: 📬 Open PR to merge release branch back to main
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr create \
          --base ${{ inputs.source_branch }} \
          --head release/${{ inputs.version }} \
          --title "Release ${{ inputs.version }}" \
          --body "Merges the version bump from the \`${{ inputs.version }}\` release back into \`${{ inputs.source_branch }}\`."
